name: glance
description: "Glance — Premium Anti-Shoulder-Surfing Privacy Overlay"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.5
  url_launcher: ^6.2.6
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/glance-logo.png"
  min_sdk_android: 24

flutter:
  uses-material-design: true
  assets:
    - assets/glance-logo.png
    - assets/glance-favicon.png
    - assets/qr_mbbank.jpg
    - assets/qr_zalopay.jpg
